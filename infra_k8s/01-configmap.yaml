apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-config
  namespace: agent
data:
  MODEL: "gpt-4o-mini"
  MAX_TOKENS: "4096"
  MAX_ITERATIONS: "20"

  # verify this matches the svc your helm release made
  TEMPORAL_HOST: "temporal-frontend.temporal.svc.cluster.local:7233"
  TEMPORAL_NAMESPACE: "default"
  TEMPORAL_TASK_QUEUE: "agent-tasks"

  GATEWAY_HOST: "0.0.0.0"
  GATEWAY_PORT: "8000"
  CORS_ORIGINS: "http://localhost:3000"
  JWT_ALGORITHM: "HS256"
  JWT_EXPIRE_MINUTES: "10080"
