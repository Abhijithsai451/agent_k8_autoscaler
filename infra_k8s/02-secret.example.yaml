# example only, don't apply. Create the real one with:
#   kubectl create secret generic agent-secrets -n agent \
#     --from-literal=OPENAI_API_KEY=sk-ant-... \
#     --from-literal=COMPOSIO_API_KEY=comp-... \
#     --from-literal=JWT_SECRET=$(openssl rand -hex 32)
apiVersion: v1
kind: Secret
metadata:
  name: agent-secrets
  namespace: agent
type: Opaque
stringData:
  OPENAI_API_KEY: "replace-me"
  COMPOSIO_API_KEY: "replace-me"
  JWT_SECRET: "replace-me"
